name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease
        # No MAPS_API_KEY set — build uses manual lat/lng entry only

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: mv "${{ steps.sign.outputs.signedReleaseFile }}" gymprint-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gymprint-${{ github.ref_name }}.apk
          generate_release_notes: true
          body: |
            ## Installation
            Download the APK below and install it on your Android device (API 26+).

            > **Note:** This build uses **manual coordinate entry** for gym setup. If you want the search-based gym picker, you'll need to [build the app yourself](../../#with-a-google-places-api-key-optional) with your own Google Places API key.
